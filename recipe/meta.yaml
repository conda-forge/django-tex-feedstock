{% set name = "django-tex" %}
{% set version = "1.1.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: deb2c6f9e79ece0698ad09524e5169f9cd19285df8a64cc9e9f96d088a52363d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools-scm
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - django >=2.2
    - jinja2 >=2.9

test:
  imports:
    - django_tex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/weinbusch/django-tex
  summary: A simple Django app to render Latex templates and compile them into PDF files.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
